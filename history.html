<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumption History - Caffeine Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 1rem;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: 700;
            color: white;
        }

        .back-btn {
            background: none;
            border: none;
            color: #d4a574;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        .filter-section {
            background: rgba(30, 30, 46, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(212, 165, 116, 0.1);
            border: 1px solid rgba(212, 165, 116, 0.3);
            color: #e0e0e0;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .filter-btn:hover {
            background: rgba(212, 165, 116, 0.2);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #d4a574 0%, #8b6f47 100%);
            border-color: #d4a574;
            color: white;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(30, 30, 46, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #808080;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #d4a574;
        }

        .section-title {
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 600;
            margin-bottom: 1rem;
            color: white;
            padding: 0 0.5rem;
        }

        .consumption-item {
            background: rgba(30, 30, 46, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 165, 116, 0.2);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .consumption-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            min-width: 150px;
        }

        .consumption-icon {
            width: 45px;
            height: 45px;
            background: rgba(212, 165, 116, 0.15);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .consumption-info {
            min-width: 0;
        }

        .consumption-label {
            font-size: 0.9rem;
            color: #e0e0e0;
            font-weight: 500;
            margin-bottom: 0.25rem;
            word-break: break-word;
        }

        .consumption-time {
            font-size: 0.8rem;
            color: #808080;
        }

        .consumption-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .consumption-amount {
            font-size: 1rem;
            font-weight: 700;
            color: #d4a574;
            text-align: right;
            min-width: 50px;
        }

        .btn-delete {
            background: rgba(248, 113, 113, 0.2);
            border: 1px solid rgba(248, 113, 113, 0.5);
            color: #f87171;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: rgba(248, 113, 113, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #606060;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 0.95rem;
        }

        .date-group {
            margin-bottom: 1.5rem;
        }

        .date-header {
            font-size: 0.85rem;
            color: #d4a574;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
            padding: 0 0.5rem;
        }

        .pb-nav {
            padding-bottom: 100px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(212, 165, 116, 0.2);
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 0 1rem 0;
            max-width: 100vw;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            color: #606060;
            text-decoration: none;
            font-size: 0.7rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            color: #d4a574;
        }

        .nav-icon {
            font-size: 1.5rem;
        }

        .nav-center-btn {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #d4a574 0%, #8b6f47 100%);
            border: none;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 8px 24px rgba(212, 165, 116, 0.3);
        }

        .nav-center-btn:hover {
            transform: translateX(-50%) scale(1.1);
        }

        .nav-center-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        @media (max-width: 480px) {
            .consumption-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .consumption-right {
                width: 100%;
                justify-content: space-between;
            }

            .consumption-amount {
                min-width: unset;
            }
        }
    </style>
</head>
<body>
    <div class="container pb-nav">
        <div class="header">
            <button class="back-btn" onclick="goHome()">←</button>
            <div class="header-title">History</div>
            <div style="width: 40px;"></div>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" onclick="filterByTime('all')">All Time</button>
            <button class="filter-btn" onclick="filterByTime('7days')">7 Days</button>
            <button class="filter-btn" onclick="filterByTime('30days')">30 Days</button>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Servings</div>
                <div class="stat-value" id="total-servings">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Caffeine</div>
                <div class="stat-value" id="total-caffeine">0</div>
                <div style="font-size: 0.7rem; color: #606060; margin-top: 0.3rem;">mg</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Per Day</div>
                <div class="stat-value" id="avg-per-day">0</div>
                <div style="font-size: 0.7rem; color: #606060; margin-top: 0.3rem;">mg</div>
            </div>
        </div>

        <div id="history-container">
            <!-- Will be populated by JavaScript -->
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><div class="nav-icon">💬</div>Home</a>
        <a href="history.html" class="nav-item active"><div class="nav-icon">📋</div>History</a>
        <div style="width: 60px;"></div>
        <a href="#" class="nav-item" onclick="comingSoon()"><div class="nav-icon">📊</div>Stats</a>
        <a href="#" class="nav-item" onclick="comingSoon()"><div class="nav-icon">⚙️</div>Settings</a>
    </div>

    <button class="nav-center-btn" onclick="goToAdd()">+</button>

    <script>
        const VD_FACTOR = 0.67;
        const HALF_LIFE = 5;

        let consumptions = [];
        let userWeight = 70;
        let currentFilter = 'all';

        function loadData() {
            const saved = localStorage.getItem('caffeineConsumptions');
            if (saved) {
                consumptions = JSON.parse(saved);
            }
            const savedWeight = localStorage.getItem('userWeight');
            if (savedWeight) {
                userWeight = parseFloat(savedWeight);
            }
            renderHistory();
            updateStats();
        }

        function filterByTime(period) {
            currentFilter = period;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderHistory();
            updateStats();
        }

        function getFilteredConsumptions() {
            const now = Date.now();
            let filtered = consumptions;

            if (currentFilter === '7days') {
                filtered = consumptions.filter(c => (now - c.time) / (1000 * 60 * 60 * 24) <= 7);
            } else if (currentFilter === '30days') {
                filtered = consumptions.filter(c => (now - c.time) / (1000 * 60 * 60 * 24) <= 30);
            }

            return filtered.sort((a, b) => b.time - a.time);
        }

        function updateStats() {
            const filtered = getFilteredConsumptions();
            const totalCaffeine = filtered.reduce((sum, c) => sum + c.amount, 0);
            
            // Calculate unique days
            const uniqueDays = new Set();
            filtered.forEach(c => {
                const date = new Date(c.time);
                date.setHours(0, 0, 0, 0);
                uniqueDays.add(date.getTime());
            });

            const avgPerDay = uniqueDays.size > 0 ? (totalCaffeine / uniqueDays.size).toFixed(0) : 0;

            document.getElementById('total-servings').textContent = filtered.length;
            document.getElementById('total-caffeine').textContent = totalCaffeine.toFixed(0);
            document.getElementById('avg-per-day').textContent = avgPerDay;
        }

        function renderHistory() {
            const filtered = getFilteredConsumptions();

            if (filtered.length === 0) {
                document.getElementById('history-container').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div class="empty-state-text">No consumption history found</div>
                    </div>
                `;
                return;
            }

            const grouped = {};
            filtered.forEach(item => {
                const date = new Date(item.time);
                date.setHours(0, 0, 0, 0);
                const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                
                if (!grouped[dateStr]) {
                    grouped[dateStr] = [];
                }
                grouped[dateStr].push(item);
            });

            let html = '';
            for (const [dateStr, items] of Object.entries(grouped)) {
                html += `<div class="date-group">`;
                html += `<div class="date-header">${dateStr}</div>`;
                items.forEach((item, index) => {
                    const date = new Date(item.time);
                    const timeStr = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                    const icon = item.type === 'coffee' ? '☕' : '💊';
                    
                    html += `
                        <div class="consumption-item">
                            <div class="consumption-left">
                                <div class="consumption-icon">${icon}</div>
                                <div class="consumption-info">
                                    <div class="consumption-label">${item.label}</div>
                                    <div class="consumption-time">${timeStr}</div>
                                </div>
                            </div>
                            <div class="consumption-right">
                                <div class="consumption-amount">${item.amount.toFixed(0)} mg</div>
                                <button class="btn-delete" onclick="deleteItem(${consumptions.indexOf(item)})">Delete</button>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }

            document.getElementById('history-container').innerHTML = html;
        }

        function deleteItem(index) {
            if (confirm('Are you sure you want to delete this entry?')) {
                consumptions.splice(index, 1);
                localStorage.setItem('caffeineConsumptions', JSON.stringify(consumptions));
                renderHistory();
                updateStats();
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        function goToAdd() {
            window.location.href = 'add-caffiene.html';
        }

        function comingSoon() {
            alert('Coming soon!');
        }

        loadData();
    </script>
</body>
</html>
